manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: kristijanribaric
      url-base: https://github.com/kristijanribaric
    - name: englmaxi
      url-base: https://github.com/englmaxi
    - name: nrfconnect
      url-base: https://github.com/nrfconnect
    - name: damex
      url-base: https://github.com/damex
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-pmw3610-driver
      url: https://github.com/kristijanribaric/zmk-pmw3610-driver-2
      revision: main
    - name: zmk-dongle-display
      remote: englmaxi
      revision: main
    - name: nice-view-gem
      remote: kristijanribaric
      revision: main
    - name: zmk-feature-split-esb
      remote: damex
      revision: main
      import: true
    - name: mbedtls
      remote: nrfconnect
      repo-path: sdk-mbedtls
      revision: ncs-v3.1.1
      path: modules/crypto/mbedtls
    - name: oberon-psa-crypto
      remote: nrfconnect
      repo-path: sdk-oberon-psa-crypto
      revision: ncs-v3.1.1
      path: modules/crypto/oberon-psa-crypto
  self:
    path: config
