description: Convert relative trackball movement into directional behavior taps.

compatible: "keyball,input-processor-trackball-arrows"

include: base.yaml

properties:
  tick:
    type: int
    required: true
  tap-ms:
    type: int
    default: 5
  wait-ms:
    type: int
    default: 20
  key-codes:
    type: array
    required: true
  track-remainders:
    type: boolean

input-processor-cells: []
